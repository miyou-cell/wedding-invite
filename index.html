<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f4f2; 
            padding: 50px 20px;
        }
        .container { max-width: 500px; margin: auto; }
        h1 { color: #8d6e63; }
        
        #claimBtn { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #d4a373; 
            color: white; 
            border: none; 
            border-radius: 25px;
            transition: 0.3s;
            display: none; 
        }
        #claimBtn:hover { background: #bc8a5f; }
        
        .hidden { display: none !important; }
        #message { margin-top: 20px; color: #5d4037; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>You're Invited!</h1>
        <p>We have a special surprise for our first 20 guests.</p>
        
        <button id="claimBtn">Reveal My Surprise</button>
        <p id="message">Checking availability...</p>
    </div>

    <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyRVIE1sQ4dV-DdsJdVSg4nD4KlM_RV_eMTnml8pnU96EgGwP0Krt5vm8yV7m1cUBvFCw/exec';
    const btn = document.getElementById('claimBtn');
    const msg = document.getElementById('message');

    btn.addEventListener('click', function() {
        btn.innerText = "Opening Surprise...";
        btn.disabled = true;

        fetch(scriptURL)
            .then(response => response.text())
            .then(result => {
                const link = result.trim();

                if (link === "EMPTY") {
                    btn.style.display = 'none';
                    msg.innerHTML = "<b>All surprises have been claimed!</b><br>We can't wait to see you at the wedding.";
                } else if (link.startsWith("http")) {
                    // Try to redirect automatically
                    window.location.replace(link);
                    
                    // Fallback: If redirect is blocked, show the link manually
                    setTimeout(() => {
                        msg.innerHTML = `Your surprise is ready! <a href="${link}">Click here if it didn't open automatically.</a>`;
                    }, 2000);
                } else {
                    msg.innerText = "Something went wrong. Please refresh and try again.";
                    btn.disabled = false;
                }
            })
            .catch(err => {
                console.error(err);
                msg.innerText = "Connection error. Please check your internet.";
                btn.disabled = false;
            });
    });
</script>
    
</body>
</html>
